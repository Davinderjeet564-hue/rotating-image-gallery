<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Rotating Image Gallery</title>
  </head>
  <body>
    <main class="main-container">
      <div class="scene">
        <div class="carousel">
          <div class="card">
            <img src="images/download (0).jpg" alt="image of a cat" />
          </div>
          <div class="card">
            <img src="images/download (1).jpg" alt="image of a tree" />
          </div>
          <div class="card">
            <img src="images/download (2).jpg" alt="image of an iron hook" />
          </div>
          <div class="card">
            <img src="images/download (3).jpg" alt="image of 3 dice" />
          </div>
          <div class="card">
            <img src="images/download (4).jpg" alt="image of house in brokly" />
          </div>
          <div class="card">
            <img src="images/download (5).jpg" alt="image of fish" />
          </div>
        </div>
        <div class="button-container">
          <button class="prev-button" title="show previous"><</button>
          <button class="next-button" title="show next">></button>
        </div>
      </div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
